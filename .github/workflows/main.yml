name: First Workflow

on:
  push:
    branches:
      - main

jobs:
  example-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print a welcome message
        run: echo "welcome to our first GitHub Actions Workflows"

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: List the repository files
        run: ls -la
